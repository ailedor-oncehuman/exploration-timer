<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>探索時間タイマー</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="探索時間タイマー">
<meta name="theme-color" content="#050914">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  background:#050914;
  overflow-x:hidden;
}

#bgLayer{
  position:fixed;
  inset:0;
  z-index:-2;
  background-size:contain;
  background-position:center top;
  background-repeat:no-repeat;
  transition:background-image 1s ease;
  animation:bgZoom 80s ease-in-out infinite alternate;
}

@keyframes bgZoom{
  from{transform:scale(1)}
  to{transform:scale(1.055)}
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.22);
  z-index:-1;
}

.sound-panel{
  position:fixed;
  top:14px;
  right:14px;
  z-index:999;
  display:flex;
  flex-direction:column;
  gap:8px;
  align-items:flex-end;
}

#bgmBtn{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(40,234,255,.8);
  background:rgba(5,15,30,.78);
  color:#28EAFF;
  font-size:14px;
  font-weight:900;
  box-shadow:0 0 14px rgba(40,234,255,.45);
  backdrop-filter:blur(4px);
}

#bgmBtn.playing{
  color:#00ff99;
  border-color:#00ff99;
  box-shadow:0 0 14px rgba(0,255,153,.6);
}

.volume-box{
  width:145px;
  padding:8px;
  border-radius:12px;
  background:rgba(5,15,30,.78);
  border:1px solid rgba(40,234,255,.35);
  display:none;
}

.sound-panel.open .volume-box{
  display:block;
}

.bgm-label{
  font-size:12px;
  font-weight:800;
  color:#fff;
  opacity:.9;
  margin-bottom:4px;
  text-align:center;
}

#volumeSlider{
  width:100%;
}

.container{
  width:100%;
  max-width:520px;
  padding:28px 20px 50px;
  border-radius:22px;
  text-align:center;
  background:rgba(5,15,30,.62);
  border:1px solid rgba(0,220,255,.65);
  box-shadow:0 0 28px rgba(0,220,255,.45);
  backdrop-filter:blur(4px);
}

.brand{
  font-size:18px;
  font-weight:900;
  letter-spacing:5px;
  color:#FFFFFF;
  margin-bottom:8px;
  text-shadow:0 0 8px #28EAFF,0 0 18px #00AFFF;
}

h1{
  font-size:34px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:18px;
  color:#28EAFF;
  text-shadow:0 0 4px #28EAFF,0 0 10px #28EAFF,0 0 18px #00AFFF;
}

.current-time{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
  text-shadow:0 0 8px rgba(255,255,255,.35);
}

.timer-box{
  padding:22px 14px;
  border-radius:18px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,.22);
  box-shadow:inset 0 0 24px rgba(255,255,255,.08),0 0 24px rgba(0,0,0,.35);
}

.ready-panel{
  border-color:#00ff99 !important;
  box-shadow:0 0 12px #00ff99,0 0 30px #00ff99,inset 0 0 20px rgba(0,255,153,.25);
  animation:panelPulse 1s infinite;
}

@keyframes panelPulse{
  50%{filter:brightness(1.35)}
}

.status{
  font-size:32px;
  font-weight:900;
  color:#FFFFFF;
  text-shadow:0 0 10px rgba(255,255,255,.45);
  margin-bottom:10px;
  letter-spacing:1px;
}

.countdown{
  font-size:64px;
  font-weight:900;
  color:#ffd45c;
  letter-spacing:2px;
  text-shadow:0 0 12px #FFD45C,0 0 24px #FFB700,0 0 38px #FFB700;
}

.progress-wrap{
  margin:18px 0 20px;
  height:16px;
  border-radius:999px;
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.22);
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#28EAFF,#00ff99);
  box-shadow:0 0 14px rgba(40,234,255,.8);
  transition:width .5s linear, background .5s linear;
}

.progress-text{
  margin-top:6px;
  font-size:14px;
  font-weight:700;
  opacity:.9;
}

.next-time{
  font-size:24px;
  font-weight:700;
  margin-bottom:20px;
  color:#FFFFFF;
  text-shadow:0 0 10px rgba(255,255,255,.4);
}

#nextHourText{
  font-size:44px;
  font-weight:900;
  display:block;
  margin-top:8px;
  letter-spacing:1px;
}

.bg-1 .timer-box{background:linear-gradient(135deg,rgba(7,18,50,.88),rgba(12,40,82,.72))}
.bg-5 .timer-box{background:linear-gradient(135deg,rgba(96,38,18,.82),rgba(255,122,45,.42))}
.bg-9 .timer-box{background:linear-gradient(135deg,rgba(12,68,102,.82),rgba(60,180,255,.35))}
.bg-13 .timer-box{background:linear-gradient(135deg,rgba(13,88,128,.78),rgba(255,205,80,.32))}
.bg-17 .timer-box{background:linear-gradient(135deg,rgba(86,34,17,.86),rgba(255,119,35,.42))}
.bg-21 .timer-box{background:linear-gradient(135deg,rgba(5,12,36,.9),rgba(20,42,78,.72))}

.warning{
  color:#ffd84d !important;
  text-shadow:0 0 18px #ffd84d;
}

.danger{
  color:#ff4d4d !important;
  text-shadow:0 0 18px #ff4d4d;
  animation:blink .8s infinite;
}

.ready{
  color:#00ff99 !important;
  text-shadow:0 0 18px #00ff99,0 0 38px #00ff99;
  animation:pulse .8s infinite;
}

@keyframes blink{50%{opacity:.35}}
@keyframes pulse{50%{transform:scale(1.06)}}

.schedule{
  margin-top:18px;
  padding:16px;
  border-radius:14px;
  background:rgba(0,10,24,.5);
  border:1px solid rgba(0,220,255,.4);
}

.schedule h2{
  color:#FFFFFF;
  font-size:28px;
  font-weight:900;
  margin-bottom:14px;
  letter-spacing:1px;
  text-shadow:0 0 10px rgba(255,255,255,.35);
}

.time-list{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.time-item{
  padding:12px 6px;
  border-radius:10px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.24);
  font-size:20px;
  font-weight:700;
}

.time-item.active{
  font-weight:900;
}

.note{
  margin-top:16px;
  font-size:14px;
  opacity:.85;
}

.ready-overlay{
  position:fixed;
  inset:0;
  z-index:998;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,20,12,.48);
  backdrop-filter:blur(3px);
}

.ready-overlay.show{
  display:flex;
  animation:overlayFade 2s ease forwards;
}

.ready-card{
  padding:28px 34px;
  border-radius:22px;
  background:rgba(0,30,20,.9);
  border:2px solid #00ff99;
  color:#00ff99;
  font-size:36px;
  font-weight:900;
  text-align:center;
  box-shadow:0 0 25px #00ff99,0 0 60px rgba(0,255,153,.65);
  text-shadow:0 0 18px #00ff99;
}

@keyframes overlayFade{
  0%{opacity:0}
  15%{opacity:1}
  80%{opacity:1}
  100%{opacity:0}
}
</style>
</head>

<body>

<div id="bgLayer"></div>

<audio id="bgm" loop preload="auto"></audio>
<audio id="warningSound" preload="auto" src="warning.mp3"></audio>
<audio id="readySound" preload="auto" src="ready.mp3"></audio>

<div class="sound-panel" id="soundPanel">
  <button id="bgmBtn">🔊 BGM ON</button>
  <div class="volume-box">
    <div class="bgm-label" id="bgmLabel">BGM</div>
    <input id="volumeSlider" type="range" min="0" max="100" value="18">
  </div>
</div>

<div class="ready-overlay" id="readyOverlay">
  <div class="ready-card">探索可能！</div>
</div>

<div class="container">
  <div class="brand">Once Human</div>
  <h1>探索時間タイマー</h1>

  <div class="current-time" id="currentTime">現在時刻 --:--:--</div>

  <div class="timer-box" id="timerBox">
    <div class="status" id="status">探索可能まで</div>
    <div class="countdown" id="countdown">00:00:00</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-text" id="progressText">進捗 0%</div>

  <div class="next-time" id="nextTime">次回探索可能時間 --:--</div>

  <div class="schedule">
    <h2>探索可能時間一覧</h2>
    <div class="time-list" id="timeList"></div>
  </div>

  <div class="note">60秒前・30秒前・10秒前にアラート音、時間になると通知音が鳴ります。</div>
</div>

<script>
const spawnHours = [1,5,9,13,17,21];
const readyWindowSeconds = 60;

const backgrounds = {
  1: "IMG_7432.jpeg",
  5: "IMG_7433.jpeg",
  9: "IMG_7434.jpeg",
  13: "IMG_7435.jpeg",
  17: "IMG_7436.jpeg",
  21: "IMG_7437.jpeg"
};

const timeColors = {
  1:  "#4DA6FF",
  5:  "#FF7AD9",
  9:  "#40E8FF",
  13: "#FFD45C",
  17: "#FF9A3C",
  21: "#B57CFF"
};

const dayHours = [5,9,13,17];

const bgm = document.getElementById("bgm");
const bgmBtn = document.getElementById("bgmBtn");
const volumeSlider = document.getElementById("volumeSlider");
const warningSound = document.getElementById("warningSound");
const readySound = document.getElementById("readySound");
const soundPanel = document.getElementById("soundPanel");
const bgmLabel = document.getElementById("bgmLabel");
const readyOverlay = document.getElementById("readyOverlay");

let bgmPlaying = false;
let currentBgmFile = "";
let lastTargetKey = "";
let playedReadyKey = "";
let playedWarnings = {};

const savedVolume = localStorage.getItem("timerVolume");
if(savedVolume !== null) volumeSlider.value = savedVolume;
setVolume(volumeSlider.value);

volumeSlider.addEventListener("input",()=>{
  setVolume(volumeSlider.value);
  localStorage.setItem("timerVolume", volumeSlider.value);
});

function setVolume(value){
  const volume = Number(value) / 100;
  bgm.volume = volume;
  warningSound.volume = Math.min(volume + 0.15, 1);
  readySound.volume = Math.min(volume + 0.2, 1);
}

bgmBtn.addEventListener("click", async ()=>{
  soundPanel.classList.toggle("open");

  try{
    if(!bgmPlaying){
      await bgm.play();
      bgmPlaying = true;
      bgmBtn.textContent = "🔇 BGM OFF";
      bgmBtn.classList.add("playing");
      localStorage.setItem("bgmPlaying","true");
    }else{
      bgm.pause();
      bgmPlaying = false;
      bgmBtn.textContent = "🔊 BGM ON";
      bgmBtn.classList.remove("playing");
      localStorage.setItem("bgmPlaying","false");
    }
  }catch(e){
    bgmBtn.textContent = "▶ BGM再生";
  }
});

function pad(num){
  return String(num).padStart(2,"0");
}

function getSpawnTimes(now){
  let last = null;
  let next = null;

  for(const hour of spawnHours){
    const candidate = new Date(now);
    candidate.setHours(hour,0,0,0);
    if(candidate <= now) last = candidate;
    if(candidate > now && !next) next = candidate;
  }

  if(!last){
    last = new Date(now);
    last.setDate(last.getDate() - 1);
    last.setHours(21,0,0,0);
  }

  if(!next){
    next = new Date(now);
    next.setDate(next.getDate() + 1);
    next.setHours(1,0,0,0);
  }

  return {last,next};
}

function getBgmFile(hour){
  return dayHours.includes(hour) ? "day_bgm.mp3" : "night_bgm.mp3";
}

async function updateBgm(hour){
  const file = getBgmFile(hour);
  const label = dayHours.includes(hour) ? "☀️ DAY BGM" : "🌙 NIGHT BGM";
  bgmLabel.textContent = label;

  if(currentBgmFile === file) return;

  currentBgmFile = file;
  const wasPlaying = bgmPlaying && !bgm.paused;

  bgm.src = file;
  bgm.load();

  if(wasPlaying){
    try{ await bgm.play(); }catch(e){}
  }
}

function playOnce(audio){
  try{
    audio.currentTime = 0;
    audio.play();
  }catch(e){}
}

function showReadyOverlay(){
  readyOverlay.classList.remove("show");
  void readyOverlay.offsetWidth;
  readyOverlay.classList.add("show");
  setTimeout(()=>readyOverlay.classList.remove("show"),2200);

  if(navigator.vibrate){
    navigator.vibrate([250,100,250]);
  }
}

function createTimeList(activeHour){
  const list = document.getElementById("timeList");
  list.innerHTML = "";

  spawnHours.forEach(hour=>{
    const item = document.createElement("div");
    item.className = "time-item";
    item.textContent = pad(hour) + ":00";

    if(hour === activeHour){
      item.classList.add("active");
      item.style.color = timeColors[hour];
      item.style.textShadow = "0 0 12px " + timeColors[hour];
      item.style.borderColor = timeColors[hour];
      item.style.boxShadow = "0 0 16px " + timeColors[hour];
    }

    list.appendChild(item);
  });
}

function updateProgressColor(progress){
  const bar = document.getElementById("progressBar");

  if(progress >= 98){
    bar.style.background = "linear-gradient(90deg,#ff4d4d,#ff9a3c)";
    bar.style.boxShadow = "0 0 14px rgba(255,77,77,.9)";
  }else if(progress >= 90){
    bar.style.background = "linear-gradient(90deg,#ffd84d,#ff9a3c)";
    bar.style.boxShadow = "0 0 14px rgba(255,216,77,.9)";
  }else if(progress >= 70){
    bar.style.background = "linear-gradient(90deg,#28EAFF,#00ff99)";
    bar.style.boxShadow = "0 0 14px rgba(0,255,153,.8)";
  }else{
    bar.style.background = "linear-gradient(90deg,#28EAFF,#40E8FF)";
    bar.style.boxShadow = "0 0 14px rgba(40,234,255,.8)";
  }
}

function updateTimer(){
  const now = new Date();
  const {last,next} = getSpawnTimes(now);

  const secondsSinceLast = Math.floor((now - last) / 1000);
  const isReady = secondsSinceLast >= 0 && secondsSinceLast < readyWindowSeconds;

  const displayTime = isReady ? last : next;
  const displayHour = displayTime.getHours();
  const targetKey = displayTime.toDateString() + "-" + displayHour;

  if(lastTargetKey !== targetKey){
    playedWarnings = {};
    lastTargetKey = targetKey;
  }

  document.getElementById("currentTime").textContent =
    "現在時刻 " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());

  const status = document.getElementById("status");
  const countdown = document.getElementById("countdown");
  const timerBox = document.getElementById("timerBox");

  status.className = "status";
  countdown.className = "countdown";
  timerBox.classList.remove("ready-panel");

  document.body.className = "bg-" + displayHour;
  document.getElementById("bgLayer").style.backgroundImage =
    "url('" + backgrounds[displayHour] + "')";

  updateBgm(displayHour);

  if(isReady){
    status.textContent = "★★★★★ 探索可能！ ★★★★★";
    status.classList.add("ready");
    countdown.classList.add("ready");
    timerBox.classList.add("ready-panel");
    countdown.textContent = "00:00:00";

    if(playedReadyKey !== targetKey){
      playOnce(readySound);
      showReadyOverlay();
      playedReadyKey = targetKey;
    }

    document.getElementById("progressBar").style.width = "100%";
    document.getElementById("progressText").textContent = "進捗 100%";
    updateProgressColor(100);

  }else{
    const totalSeconds = Math.floor((next - now) / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    status.textContent = "探索可能まで";
    countdown.textContent = pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);

    if(totalSeconds <= 60){
      status.classList.add("danger");
      countdown.classList.add("danger");
    }else if(totalSeconds <= 300){
      status.classList.add("warning");
      countdown.classList.add("warning");
    }

    [60,30,10].forEach(mark=>{
      if(totalSeconds === mark && !playedWarnings[mark]){
        playOnce(warningSound);
        playedWarnings[mark] = true;
      }
    });

    const period = next - last;
    const elapsed = now - last;
    const progress = Math.max(0, Math.min(100, Math.floor((elapsed / period) * 100)));
    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("progressText").textContent = "進捗 " + progress + "%";
    updateProgressColor(progress);
  }

  document.getElementById("nextTime").innerHTML =
    '次回探索可能時間<br><span id="nextHourText">' +
    pad(displayHour) +
    ':00</span>';

  const nextHourText = document.getElementById("nextHourText");
  nextHourText.style.color = timeColors[displayHour];
  nextHourText.style.textShadow = "0 0 15px " + timeColors[displayHour];

  createTimeList(displayHour);
}

updateTimer();
setInterval(updateTimer,1000);
</script>

</body>
</html>

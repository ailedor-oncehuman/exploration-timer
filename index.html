<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>探索時間タイマー</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="探索時間タイマー">
<meta name="theme-color" content="#050914">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  color:#fff;
  font-family:
    "Arial Rounded MT Bold",
    "Hiragino Kaku Gothic ProN",
    "Yu Gothic",
    Meiryo,
    sans-serif;
  background:#050914;
  overflow-x:hidden;
}

#bgLayer{
  position:fixed;
  inset:0;
  z-index:-3;
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  filter:brightness(1.02) contrast(1.08) saturate(1.22);
  animation:bgZoom 90s ease-in-out infinite alternate;
  transition:background-image 1s ease;
}

@keyframes bgZoom{
  from{transform:scale(1)}
  to{transform:scale(1.03)}
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    linear-gradient(
      to bottom,
      rgba(0,0,0,.04) 0%,
      rgba(0,0,0,.12) 30%,
      rgba(0,8,18,.48) 68%,
      rgba(0,8,18,.82) 100%
    );
  pointer-events:none;
}

.app{
  width:100%;
  max-width:520px;
  margin:0 auto;
  padding:20px 16px 88px;
}

/* BGM */

.sound-panel{
  position:fixed;
  top:72px;
  right:12px;
  z-index:999;
  width:132px;
}

#bgmBtn{
  width:100%;
  height:46px;
  border-radius:14px;
  border:1px solid #25eaff;
  background:rgba(0,15,28,.84);
  color:#dfffff;
  font-size:14px;
  font-weight:900;
  text-shadow:0 0 5px #28eaff;
  box-shadow:0 0 8px rgba(37,234,255,.45),inset 0 0 8px rgba(37,234,255,.12);
  backdrop-filter:blur(5px);
}

#bgmBtn.playing{
  color:#caffea;
  border-color:#00ff99;
  text-shadow:0 0 5px #00ff99;
}

.volume-box{
  display:none;
  margin-top:8px;
  padding:10px;
  border-radius:14px;
  background:rgba(0,15,28,.84);
  border:1px solid rgba(37,234,255,.65);
  backdrop-filter:blur(5px);
}

.sound-panel.open .volume-box{display:block}

.bgm-label{
  text-align:center;
  margin-bottom:8px;
  color:#fff4a8;
  font-size:13px;
  font-weight:900;
  text-shadow:0 0 5px #ffe94d;
}

#volumeSlider{
  width:100%;
  accent-color:#00ff99;
}

/* HEADER */

.header{
  text-align:center;
  padding-top:8px;
  margin-bottom:14px;
}

.brand-small{
  font-size:18px;
  font-weight:900;
  letter-spacing:9px;
  color:#dfffff;
  line-height:1;
  text-shadow:
    0 0 2px #28eaff,
    0 0 6px #28eaff,
    0 0 12px #00aaff;
}

.brand-main{
  font-size:54px;
  font-weight:900;
  letter-spacing:4px;
  line-height:.95;
  color:#dfffff;
  -webkit-text-stroke:1px rgba(40,234,255,.6);
  text-shadow:
    0 0 3px #28eaff,
    0 0 8px #28eaff,
    0 0 16px #00bfff,
    0 0 26px #00aaff;
}

.title{
  margin-top:8px;
  font-size:39px;
  font-weight:900;
  color:#ffe5f5;
  letter-spacing:2px;
  -webkit-text-stroke:1px rgba(255,53,184,.8);
  text-shadow:
    0 0 3px #ff35b8,
    0 0 8px #ff35b8,
    0 0 16px #ff008c,
    0 0 26px #ff008c;
}

/* PANELS */

.panel{
  position:relative;
  background:rgba(0,10,20,.58);
  border:1px solid rgba(40,234,255,.78);
  border-radius:22px;
  box-shadow:
    0 0 10px rgba(40,234,255,.34),
    inset 0 0 18px rgba(40,234,255,.06);
  backdrop-filter:blur(8px);
  overflow:hidden;
}

.panel::before,
.panel::after{
  content:"";
  position:absolute;
  width:46px;
  height:24px;
  border-color:rgba(255,255,255,.9);
  pointer-events:none;
}

.panel::before{
  left:10px;
  top:10px;
  border-left:2px solid;
  border-top:2px solid;
  border-radius:16px 0 0 0;
}

.panel::after{
  right:10px;
  bottom:10px;
  border-right:2px solid;
  border-bottom:2px solid;
  border-radius:0 0 16px 0;
}

.card{
  padding:22px 18px 24px;
}

.current-time{
  font-size:21px;
  font-weight:900;
  margin-bottom:18px;
  color:#f7ffff;
  text-shadow:0 0 4px rgba(255,255,255,.55);
}

.current-time span{
  color:#dfffff;
  margin-right:8px;
  -webkit-text-stroke:.5px rgba(40,234,255,.75);
  text-shadow:0 0 4px #28eaff,0 0 9px #00aaff;
}

.timer-box{
  padding:22px 10px;
  border-radius:18px;
  margin-bottom:18px;
  background:rgba(0,15,24,.42);
  box-shadow:inset 0 0 18px rgba(0,0,0,.32);
}

.status{
  font-size:31px;
  font-weight:900;
  color:#dfffff;
  margin-bottom:8px;
  -webkit-text-stroke:.7px rgba(40,234,255,.8);
  text-shadow:
    0 0 4px #28eaff,
    0 0 9px #28eaff,
    0 0 16px #00aaff;
}

.countdown{
  font-size:52px;
  font-weight:900;
  line-height:1;
  letter-spacing:1px;
  color:#fff0a6;
  -webkit-text-stroke:1px rgba(255,196,0,.75);
  text-shadow:
    0 0 4px #ffd84d,
    0 0 10px #ffd84d,
    0 0 18px #ffb700,
    0 0 28px #ffb700;
}

/* PROGRESS */

.progress-wrap{
  margin:18px 0 8px;
  height:20px;
  border-radius:999px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.32);
  overflow:hidden;
  box-shadow:inset 0 0 9px rgba(0,0,0,.48);
}

.progress-bar{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#00eaff 0%,#00ff99 42%,#ffe600 76%,#ff3030 100%);
  box-shadow:0 0 8px rgba(255,216,77,.65);
  transition:width .5s linear;
}

.progress-text{
  font-size:18px;
  font-weight:900;
  color:#caffea;
  text-shadow:0 0 4px #00ff99,0 0 9px #00ff99;
  margin-bottom:14px;
}

/* NEXT */

.next-time{
  font-size:27px;
  font-weight:900;
  color:#dfffff;
  -webkit-text-stroke:.7px rgba(40,234,255,.8);
  text-shadow:0 0 4px #28eaff,0 0 10px #28eaff,0 0 18px #00aaff;
}

#nextHourText{
  display:block;
  margin-top:6px;
  font-size:54px;
  font-weight:900;
  letter-spacing:1px;
}

#remainingText{
  margin-top:3px;
  font-size:22px;
  font-weight:900;
  color:#fff;
  text-shadow:0 0 4px rgba(255,255,255,.55);
}

#remainingText span{
  color:#fff0a6;
  -webkit-text-stroke:.6px rgba(255,196,0,.65);
  text-shadow:0 0 5px #ffd84d,0 0 10px #ffb700;
}

/* SCHEDULE */

.schedule{
  margin-top:14px;
  padding:18px;
}

.schedule h2{
  color:#dfffff;
  font-size:27px;
  font-weight:900;
  margin-bottom:18px;
  text-align:center;
  -webkit-text-stroke:.7px rgba(40,234,255,.8);
  text-shadow:0 0 4px #28eaff,0 0 10px #28eaff,0 0 18px #00aaff;
}

.time-list{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.time-item{
  padding:14px 6px;
  border-radius:14px;
  background:rgba(3,12,22,.58);
  border:1px solid rgba(255,255,255,.25);
  font-size:22px;
  font-weight:900;
  text-align:center;
  box-shadow:inset 0 0 10px rgba(255,255,255,.04);
}

.time-item.active{
  transform:scale(1.04);
}

.note{
  margin-top:14px;
  padding:16px;
  font-size:15px;
  line-height:1.7;
}

/* READY */

.ready-panel{
  border:1px solid #00ff99 !important;
  box-shadow:
    0 0 12px #00ff99,
    0 0 24px rgba(0,255,153,.7),
    inset 0 0 18px rgba(0,255,153,.22);
  animation:panelPulse 1s infinite;
}

@keyframes panelPulse{
  50%{filter:brightness(1.2)}
}

.ready-overlay{
  position:fixed;
  inset:0;
  z-index:998;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,20,12,.44);
  backdrop-filter:blur(3px);
}

.ready-overlay.show{
  display:flex;
  animation:overlayFade 2s ease forwards;
}

.ready-card{
  padding:30px 36px;
  border-radius:22px;
  background:rgba(0,30,20,.9);
  border:2px solid #00ff99;
  color:#eafff5;
  font-size:38px;
  font-weight:900;
  text-align:center;
  box-shadow:0 0 18px #00ff99,0 0 42px rgba(0,255,153,.55);
  text-shadow:0 0 10px #00ff99;
}

.warning{
  color:#fff0a6 !important;
  text-shadow:0 0 10px #ffd84d !important;
}

.danger{
  color:#fff !important;
  -webkit-text-stroke:.7px #ff4d4d;
  text-shadow:0 0 10px #ff4d4d !important;
  animation:blink .8s infinite;
}

.ready{
  color:#eafff5 !important;
  -webkit-text-stroke:.7px #00ff99;
  text-shadow:0 0 10px #00ff99,0 0 20px #00ff99 !important;
  animation:pulse .8s infinite;
}

@keyframes overlayFade{
  0%{opacity:0}
  15%{opacity:1}
  80%{opacity:1}
  100%{opacity:0}
}

@keyframes blink{50%{opacity:.35}}
@keyframes pulse{50%{transform:scale(1.04)}}

@media(max-width:420px){
  .app{padding:18px 16px 90px}
  .sound-panel{top:70px;right:10px;width:126px}
  #bgmBtn{height:44px;font-size:13px}
  .brand-small{font-size:18px}
  .brand-main{font-size:48px}
  .title{font-size:37px}
  .status{font-size:29px}
  .countdown{font-size:48px}
  #nextHourText{font-size:50px}
  .time-item{font-size:20px}
}
</style>
</head>

<body>

<div id="bgLayer"></div>

<audio id="bgm" loop preload="auto"></audio>
<audio id="warningSound" preload="auto" src="warning.mp3"></audio>
<audio id="readySound" preload="auto" src="ready.mp3"></audio>

<div class="sound-panel" id="soundPanel">
  <button id="bgmBtn">🔊 BGM ON</button>
  <div class="volume-box">
    <div class="bgm-label" id="bgmLabel">BGM</div>
    <input id="volumeSlider" type="range" min="0" max="100" value="18">
  </div>
</div>

<div class="ready-overlay" id="readyOverlay">
  <div class="ready-card">探索可能！</div>
</div>

<div class="app">

  <div class="header">
    <div class="brand-small">ONCE</div>
    <div class="brand-main">HUMAN</div>
    <div class="title">探索タイマー</div>
  </div>

  <div class="card panel">
    <div class="current-time" id="currentTime">現在時刻 --:--:--</div>

    <div class="timer-box" id="timerBox">
      <div class="status" id="status">探索可能まで</div>
      <div class="countdown" id="countdown">00:00:00</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">進捗 0%</div>

    <div class="next-time" id="nextTime">次回探索可能時間 --:--</div>
    <div id="remainingText">あと <span>--分--秒</span></div>
  </div>

  <div class="schedule panel">
    <h2>探索可能時間一覧</h2>
    <div class="time-list" id="timeList"></div>
  </div>

  <div class="note panel">🔊 60秒前・30秒前・10秒前に警告音、時間になると通知音が鳴ります。</div>

</div>

<script>
const spawnHours = [1,5,9,13,17,21];
const readyWindowSeconds = 60;

const backgrounds = {
  1: "IMG_7432.jpeg",
  5: "IMG_7433.jpeg",
  9: "IMG_7434.jpeg",
  13: "IMG_7435.jpeg",
  17: "IMG_7436.jpeg",
  21: "IMG_7437.jpeg"
};

const timeColors = {
  1:  "#28EAFF",
  5:  "#FF5FCB",
  9:  "#28EAFF",
  13: "#F4FF35",
  17: "#FFB000",
  21: "#B57CFF"
};

const dayHours = [5,9,13,17];

const bgm = document.getElementById("bgm");
const bgmBtn = document.getElementById("bgmBtn");
const volumeSlider = document.getElementById("volumeSlider");
const warningSound = document.getElementById("warningSound");
const readySound = document.getElementById("readySound");
const soundPanel = document.getElementById("soundPanel");
const bgmLabel = document.getElementById("bgmLabel");
const readyOverlay = document.getElementById("readyOverlay");

let bgmPlaying = false;
let currentBgmFile = "";
let lastTargetKey = "";
let playedReadyKey = "";
let playedWarnings = {};

const savedVolume = localStorage.getItem("timerVolume");
if(savedVolume !== null) volumeSlider.value = savedVolume;
setVolume(volumeSlider.value);

volumeSlider.addEventListener("input",()=>{
  setVolume(volumeSlider.value);
  localStorage.setItem("timerVolume", volumeSlider.value);
});

function setVolume(value){
  const volume = Number(value) / 100;
  bgm.volume = volume;
  warningSound.volume = Math.min(volume + 0.15, 1);
  readySound.volume = Math.min(volume + 0.2, 1);
}

bgmBtn.addEventListener("click", async ()=>{
  soundPanel.classList.toggle("open");

  try{
    if(!bgmPlaying){
      await bgm.play();
      bgmPlaying = true;
      bgmBtn.textContent = "🔇 BGM OFF";
      bgmBtn.classList.add("playing");
      localStorage.setItem("bgmPlaying","true");
    }else{
      bgm.pause();
      bgmPlaying = false;
      bgmBtn.textContent = "🔊 BGM ON";
      bgmBtn.classList.remove("playing");
      localStorage.setItem("bgmPlaying","false");
    }
  }catch(e){
    bgmBtn.textContent = "▶ BGM再生";
  }
});

function pad(num){
  return String(num).padStart(2,"0");
}

function getSpawnTimes(now){
  let last = null;
  let next = null;

  for(const hour of spawnHours){
    const candidate = new Date(now);
    candidate.setHours(hour,0,0,0);
    if(candidate <= now) last = candidate;
    if(candidate > now && !next) next = candidate;
  }

  if(!last){
    last = new Date(now);
    last.setDate(last.getDate() - 1);
    last.setHours(21,0,0,0);
  }

  if(!next){
    next = new Date(now);
    next.setDate(next.getDate() + 1);
    next.setHours(1,0,0,0);
  }

  return {last,next};
}

function getBgmFile(hour){
  return dayHours.includes(hour) ? "day_bgm.mp3" : "night_bgm.mp3";
}

async function updateBgm(hour){
  const file = getBgmFile(hour);
  bgmLabel.textContent = dayHours.includes(hour) ? "☀️ DAY BGM" : "🌙 NIGHT BGM";

  if(currentBgmFile === file) return;

  currentBgmFile = file;
  const wasPlaying = bgmPlaying && !bgm.paused;

  bgm.src = file;
  bgm.load();

  if(wasPlaying){
    try{ await bgm.play(); }catch(e){}
  }
}

function playOnce(audio){
  try{
    audio.currentTime = 0;
    audio.play();
  }catch(e){}
}

function showReadyOverlay(){
  readyOverlay.classList.remove("show");
  void readyOverlay.offsetWidth;
  readyOverlay.classList.add("show");
  setTimeout(()=>readyOverlay.classList.remove("show"),2200);

  if(navigator.vibrate){
    navigator.vibrate([250,100,250]);
  }
}

function createTimeList(activeHour){
  const list = document.getElementById("timeList");
  list.innerHTML = "";

  spawnHours.forEach(hour=>{
    const item = document.createElement("div");
    item.className = "time-item";
    item.textContent = pad(hour) + ":00";

    item.style.color = timeColors[hour];
    item.style.textShadow = "0 0 6px " + timeColors[hour];

    if(hour === activeHour){
      item.classList.add("active");
      item.style.borderColor = timeColors[hour];
      item.style.boxShadow =
        "0 0 8px " + timeColors[hour] +
        ", inset 0 0 8px rgba(255,255,255,.07)";
    }

    list.appendChild(item);
  });
}

function updateProgressColor(progress){
  const bar = document.getElementById("progressBar");

  if(progress >= 98){
    bar.style.background = "linear-gradient(90deg,#ff4d4d,#ff9a3c)";
  }else if(progress >= 90){
    bar.style.background = "linear-gradient(90deg,#ffd84d,#ff9a3c)";
  }else if(progress >= 70){
    bar.style.background = "linear-gradient(90deg,#28EAFF,#00ff99)";
  }else{
    bar.style.background = "linear-gradient(90deg,#28EAFF,#40E8FF)";
  }
}

function updateTimer(){
  const now = new Date();
  const {last,next} = getSpawnTimes(now);

  const secondsSinceLast = Math.floor((now - last) / 1000);
  const isReady = secondsSinceLast >= 0 && secondsSinceLast < readyWindowSeconds;

  const displayTime = isReady ? last : next;
  const displayHour = displayTime.getHours();
  const targetKey = displayTime.toDateString() + "-" + displayHour;

  if(lastTargetKey !== targetKey){
    playedWarnings = {};
    lastTargetKey = targetKey;
  }

  document.getElementById("currentTime").innerHTML =
    "<span>現在時刻</span> " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());

  const status = document.getElementById("status");
  const countdown = document.getElementById("countdown");
  const timerBox = document.getElementById("timerBox");

  status.className = "status";
  countdown.className = "countdown";
  timerBox.classList.remove("ready-panel");

  document.getElementById("bgLayer").style.backgroundImage =
    "url('" + backgrounds[displayHour] + "')";

  updateBgm(displayHour);

  if(isReady){
    status.textContent = "★★★★★ 探索可能！ ★★★★★";
    status.classList.add("ready");
    countdown.classList.add("ready");
    timerBox.classList.add("ready-panel");
    countdown.textContent = "00:00:00";

    if(playedReadyKey !== targetKey){
      playOnce(readySound);
      showReadyOverlay();
      playedReadyKey = targetKey;
    }

    document.getElementById("progressBar").style.width = "100%";
    document.getElementById("progressText").textContent = "進捗 100%";
    document.getElementById("remainingText").innerHTML = "探索可能中";
    updateProgressColor(100);

  }else{
    const totalSeconds = Math.floor((next - now) / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    status.textContent = "探索可能まで";
    countdown.textContent = pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);

    if(totalSeconds <= 60){
      status.classList.add("danger");
      countdown.classList.add("danger");
    }else if(totalSeconds <= 300){
      status.classList.add("warning");
      countdown.classList.add("warning");
    }

    [60,30,10].forEach(mark=>{
      if(totalSeconds === mark && !playedWarnings[mark]){
        playOnce(warningSound);
        playedWarnings[mark] = true;
      }
    });

    const period = next - last;
    const elapsed = now - last;
    const progress = Math.max(0, Math.min(100, Math.floor((elapsed / period) * 100)));

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("progressText").textContent = "進捗 " + progress + "%";
    updateProgressColor(progress);

    document.getElementById("remainingText").innerHTML =
      "あと <span>" + pad(hours) + "時間" + pad(minutes) + "分" + pad(seconds) + "秒</span>";
  }

  document.getElementById("nextTime").innerHTML =
    '次回探索可能時間<br><span id="nextHourText">' +
    pad(displayHour) +
    ':00</span>';

  const nextHourText = document.getElementById("nextHourText");
  nextHourText.style.color = timeColors[displayHour];
  nextHourText.style.textShadow = "0 0 8px " + timeColors[displayHour];

  createTimeList(displayHour);
}

updateTimer();
setInterval(updateTimer,1000);
</script>

</body>
</html>

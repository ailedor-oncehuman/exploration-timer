<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>探索時間タイマー</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  background-size:contain;
  background-position:center top;
  background-repeat:no-repeat;
  background-color:#050914;
  transition:background-image 1s ease;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.22);
  z-index:-1;
}

#bgmBtn{
  position:fixed;
  top:14px;
  right:14px;
  z-index:999;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(40,234,255,.8);
  background:rgba(5,15,30,.78);
  color:#28EAFF;
  font-size:14px;
  font-weight:900;
  box-shadow:0 0 14px rgba(40,234,255,.45);
  backdrop-filter:blur(4px);
}

#bgmBtn.playing{
  color:#00ff99;
  border-color:#00ff99;
  box-shadow:0 0 14px rgba(0,255,153,.6);
}

.container{
  width:100%;
  max-width:520px;
  padding:28px 20px 50px;
  border-radius:22px;
  text-align:center;
  background:rgba(5,15,30,.62);
  border:1px solid rgba(0,220,255,.65);
  box-shadow:0 0 28px rgba(0,220,255,.45);
  backdrop-filter:blur(4px);
}

h1{
  font-size:34px;
  font-weight:900;
  letter-spacing:2px;
  margin-bottom:18px;
  color:#28EAFF;
  text-shadow:
    0 0 4px #28EAFF,
    0 0 10px #28EAFF,
    0 0 18px #00AFFF;
}

.current-time{
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
  text-shadow:0 0 8px rgba(255,255,255,.35);
}

.timer-box{
  padding:22px 14px;
  border-radius:18px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,.22);
  box-shadow:
    inset 0 0 24px rgba(255,255,255,.08),
    0 0 24px rgba(0,0,0,.35);
}

.ready-panel{
  border-color:#00ff99 !important;
  box-shadow:
    0 0 12px #00ff99,
    0 0 30px #00ff99,
    inset 0 0 20px rgba(0,255,153,.25);
}

.status{
  font-size:32px;
  font-weight:900;
  color:#FFFFFF;
  text-shadow:0 0 10px rgba(255,255,255,.45);
  margin-bottom:10px;
  letter-spacing:1px;
}

.countdown{
  font-size:64px;
  font-weight:900;
  color:#ffd45c;
  letter-spacing:2px;
  text-shadow:
    0 0 12px #FFD45C,
    0 0 24px #FFB700,
    0 0 38px #FFB700;
}

.next-time{
  font-size:24px;
  font-weight:700;
  margin-bottom:20px;
  color:#FFFFFF;
  text-shadow:0 0 10px rgba(255,255,255,.4);
}

#nextHourText{
  font-size:44px;
  font-weight:900;
  display:block;
  margin-top:8px;
  letter-spacing:1px;
}

.bg-1 .timer-box{
  background:linear-gradient(135deg,rgba(7,18,50,.88),rgba(12,40,82,.72));
}

.bg-5 .timer-box{
  background:linear-gradient(135deg,rgba(96,38,18,.82),rgba(255,122,45,.42));
}

.bg-9 .timer-box{
  background:linear-gradient(135deg,rgba(12,68,102,.82),rgba(60,180,255,.35));
}

.bg-13 .timer-box{
  background:linear-gradient(135deg,rgba(13,88,128,.78),rgba(255,205,80,.32));
}

.bg-17 .timer-box{
  background:linear-gradient(135deg,rgba(86,34,17,.86),rgba(255,119,35,.42));
}

.bg-21 .timer-box{
  background:linear-gradient(135deg,rgba(5,12,36,.9),rgba(20,42,78,.72));
}

.warning{
  color:#ffd84d !important;
  text-shadow:0 0 18px #ffd84d;
}

.danger{
  color:#ff4d4d !important;
  text-shadow:0 0 18px #ff4d4d;
  animation:blink .8s infinite;
}

.ready{
  color:#00ff99 !important;
  text-shadow:
    0 0 18px #00ff99,
    0 0 38px #00ff99;
  animation:pulse .8s infinite;
}

@keyframes blink{
  50%{opacity:.35}
}

@keyframes pulse{
  50%{transform:scale(1.06)}
}

.schedule{
  margin-top:18px;
  padding:16px;
  border-radius:14px;
  background:rgba(0,10,24,.5);
  border:1px solid rgba(0,220,255,.4);
}

.schedule h2{
  color:#FFFFFF;
  font-size:28px;
  font-weight:900;
  margin-bottom:14px;
  letter-spacing:1px;
  text-shadow:0 0 10px rgba(255,255,255,.35);
}

.time-list{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.time-item{
  padding:12px 6px;
  border-radius:10px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.24);
  font-size:20px;
  font-weight:700;
}

.time-item.active{
  font-weight:900;
}

.note{
  margin-top:16px;
  font-size:14px;
  opacity:.85;
}
</style>
</head>

<body>

<audio id="bgm" loop preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<button id="bgmBtn">🔊 BGM ON</button>

<div class="container">
  <h1>探索時間タイマー</h1>

  <div class="current-time" id="currentTime">現在時刻 --:--:--</div>

  <div class="timer-box" id="timerBox">
    <div class="status" id="status">探索可能まで</div>
    <div class="countdown" id="countdown">00:00:00</div>
  </div>

  <div class="next-time" id="nextTime">次回探索可能時間 --:--</div>

  <div class="schedule">
    <h2>探索可能時間一覧</h2>
    <div class="time-list" id="timeList"></div>
  </div>

  <div class="note">残り5分で黄色、残り1分で赤色、時間になると探索可能！</div>
</div>

<script>
const spawnHours = [1,5,9,13,17,21];

const backgrounds = {
  1: "IMG_7432.jpeg",
  5: "IMG_7433.jpeg",
  9: "IMG_7434.jpeg",
  13: "IMG_7435.jpeg",
  17: "IMG_7436.jpeg",
  21: "IMG_7437.jpeg"
};

const timeColors = {
  1:  "#4DA6FF",
  5:  "#FF7AD9",
  9:  "#40E8FF",
  13: "#FFD45C",
  17: "#FF9A3C",
  21: "#B57CFF"
};

const bgm = document.getElementById("bgm");
const bgmBtn = document.getElementById("bgmBtn");

bgm.volume = 0.18;

let bgmPlaying = false;

bgmBtn.addEventListener("click", async function(){
  try{
    if(!bgmPlaying){
      await bgm.play();
      bgmPlaying = true;
      bgmBtn.textContent = "🔇 BGM OFF";
      bgmBtn.classList.add("playing");
      localStorage.setItem("bgmPlaying","true");
    }else{
      bgm.pause();
      bgmPlaying = false;
      bgmBtn.textContent = "🔊 BGM ON";
      bgmBtn.classList.remove("playing");
      localStorage.setItem("bgmPlaying","false");
    }
  }catch(e){
    bgmBtn.textContent = "▶ BGM再生";
  }
});

window.addEventListener("load", function(){
  if(localStorage.getItem("bgmPlaying") === "true"){
    bgmBtn.textContent = "▶ BGM再生";
  }
});

function pad(num){
  return String(num).padStart(2,"0");
}

function createTimeList(activeHour){
  const list = document.getElementById("timeList");
  list.innerHTML = "";

  spawnHours.forEach(hour=>{
    const item = document.createElement("div");
    item.className = "time-item";
    item.textContent = pad(hour) + ":00";

    if(hour === activeHour){
      item.classList.add("active");
      item.style.color = timeColors[hour];
      item.style.textShadow = "0 0 12px " + timeColors[hour];
      item.style.borderColor = timeColors[hour];
      item.style.boxShadow = "0 0 16px " + timeColors[hour];
    }

    list.appendChild(item);
  });
}

function updateTimer(){
  const now = new Date();

  document.getElementById("currentTime").textContent =
    "現在時刻 " +
    pad(now.getHours()) + ":" +
    pad(now.getMinutes()) + ":" +
    pad(now.getSeconds());

  let nextTime = null;

  for(const hour of spawnHours){
    const candidate = new Date(now);
    candidate.setHours(hour,0,0,0);

    if(candidate > now){
      nextTime = candidate;
      break;
    }
  }

  if(!nextTime){
    nextTime = new Date(now);
    nextTime.setDate(nextTime.getDate()+1);
    nextTime.setHours(1,0,0,0);
  }

  const nextHour = nextTime.getHours();
  const totalSeconds = Math.floor((nextTime - now) / 1000);

  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  const status = document.getElementById("status");
  const countdown = document.getElementById("countdown");
  const timerBox = document.getElementById("timerBox");

  status.className = "status";
  countdown.className = "countdown";
  timerBox.classList.remove("ready-panel");

  document.body.className = "bg-" + nextHour;

  if(totalSeconds <= 0){
    status.textContent = "★★★★★ 探索可能！ ★★★★★";
    status.classList.add("ready");
    countdown.classList.add("ready");
    timerBox.classList.add("ready-panel");
    countdown.textContent = "00:00:00";
  }else{
    status.textContent = "探索可能まで";

    countdown.textContent =
      pad(hours) + ":" +
      pad(minutes) + ":" +
      pad(seconds);

    if(totalSeconds <= 60){
      status.classList.add("danger");
      countdown.classList.add("danger");
    }else if(totalSeconds <= 300){
      status.classList.add("warning");
      countdown.classList.add("warning");
    }
  }

  document.getElementById("nextTime").innerHTML =
    '次回探索可能時間<br><span id="nextHourText">' +
    pad(nextHour) +
    ':00</span>';

  const nextHourText = document.getElementById("nextHourText");
  nextHourText.style.color = timeColors[nextHour];
  nextHourText.style.textShadow = "0 0 15px " + timeColors[nextHour];

  createTimeList(nextHour);

  document.body.style.backgroundImage =
    "url('" + backgrounds[nextHour] + "')";
}

updateTimer();
setInterval(updateTimer,1000);
</script>

</body>
</html>
